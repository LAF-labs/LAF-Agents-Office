version: 2

builds:
  - id: laf-office
    main: ./cmd/laf-office
    binary: laf-office
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      # Inject the release version (and build timestamp) so `laf-office --version`
      # reports the actual release instead of the hardcoded 0.1.0 fallback in
      # internal/buildinfo. goreleaser exposes {{.Version}} without a leading v
      # and {{.Date}} as RFC3339 — both match what buildinfo.Current() returns
      # to users.
      - -s -w
      - -X github.com/LAF-labs/LAF-Agents-Office/internal/buildinfo.Version={{.Version}}
      - -X github.com/LAF-labs/LAF-Agents-Office/internal/buildinfo.BuildTimestamp={{.Date}}
  - id: laf-runner
    main: ./cmd/laf-runner
    binary: laf-runner
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X github.com/LAF-labs/LAF-Agents-Office/internal/buildinfo.Version={{.Version}}
      - -X github.com/LAF-labs/LAF-Agents-Office/internal/buildinfo.BuildTimestamp={{.Date}}
  - id: laf-runner-installer
    main: ./cmd/laf-runner-installer
    binary: laf-runner-installer
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    env:
      - CGO_ENABLED=0
    ldflags:
      - -H=windowsgui
      - -s -w
      - -X github.com/LAF-labs/LAF-Agents-Office/internal/buildinfo.Version={{.Version}}
      - -X github.com/LAF-labs/LAF-Agents-Office/internal/buildinfo.BuildTimestamp={{.Date}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "laf-office_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - packaging/README.md
      - packaging/windows/build-runner-msi.ps1
      - packaging/windows/build-runner-dev-package.ps1
      - packaging/windows/install-runner.ps1
      - packaging/windows/install-runner-protocol.ps1
      - packaging/windows/laf-runner.wxs
      - packaging/windows/uninstall-runner.ps1
      - packaging/macos/build-runner-pkg.sh
      - packaging/macos/install-runner-protocol.sh

checksum:
  name_template: checksums.txt

changelog:
  disable: true

release:
  github:
    owner: LAF-labs
    name: LAF-Agents-Office
